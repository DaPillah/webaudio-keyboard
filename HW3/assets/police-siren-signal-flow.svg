  <text x="82" y="106" fill="#173436" font-family="Avenir Next, Trebuchet MS, sans-serif" font-size="42" font-weight="700">Police Siren Signal Flow</text>
  <text x="82" y="146" fill="#557273" font-family="Avenir Next, Trebuchet MS, sans-serif" font-size="22">Log sweep LFO modulates the siren oscillator, then horn shaping and short echoes create the final emergency sound.</text>

