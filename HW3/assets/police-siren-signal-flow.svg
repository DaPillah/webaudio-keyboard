  <text x="498" y="296" text-anchor="middle" fill="#7C4DB8" font-family="Avenir Next, Trebuchet MS, sans-serif" font-size="22">300 Hz to 1100 Hz</text>

  <rect x="706" y="218" width="240" height="110" rx="22" fill="#E7F5F0" stroke="#8BC4B4" stroke-width="2"/>
