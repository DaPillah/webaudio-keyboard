  <text x="511" y="358" text-anchor="middle" fill="#4A708E" font-family="Avenir Next, Trebuchet MS, sans-serif" font-size="24">400 Hz</text>

  <rect x="716" y="258" width="264" height="142" rx="22" fill="#FFF8F0" stroke="#E7C58C" stroke-width="2"/>
  <text x="848" y="314" text-anchor="middle" fill="#845B13" font-family="Avenir Next, Trebuchet MS, sans-serif" font-size="30" font-weight="700">Resonant HPF</text>
  <text x="848" y="350" text-anchor="middle" fill="#A77A24" font-family="Avenir Next, Trebuchet MS, sans-serif" font-size="24">cutoff = 500 + drift * 400</text>
  <text x="848" y="380" text-anchor="middle" fill="#A77A24" font-family="Avenir Next, Trebuchet MS, sans-serif" font-size="24">narrow Q band</text>

