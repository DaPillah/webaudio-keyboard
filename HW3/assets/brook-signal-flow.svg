  <text x="848" y="570" text-anchor="middle" fill="#5B2C93" font-family="Avenir Next, Trebuchet MS, sans-serif" font-size="30" font-weight="700">Scale + Offset</text>
  <text x="848" y="608" text-anchor="middle" fill="#7C4DB8" font-family="Avenir Next, Trebuchet MS, sans-serif" font-size="24">drift * 400 + 500</text>

