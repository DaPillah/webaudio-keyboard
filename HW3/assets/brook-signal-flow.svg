  <text x="84" y="110" fill="#173436" font-family="Avenir Next, Trebuchet MS, sans-serif" font-size="42" font-weight="700">Babbling Brook Signal Flow</text>
  <text x="84" y="150" fill="#557273" font-family="Avenir Next, Trebuchet MS, sans-serif" font-size="22">Simplified patch: one brown-noise audio source, one slow brown-noise modulator, and a narrow resonant high-pass band.</text>

  <rect x="88" y="280" width="220" height="98" rx="22" fill="#E7F5F0" stroke="#8BC4B4" stroke-width="2"/>
